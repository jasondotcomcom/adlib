<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:-apple-system,BlinkMacSystemFont,sans-serif;
  background:#FAFAF8;color:#1A1A1A;
  min-height:100vh;min-height:100dvh;overflow:hidden;
  -webkit-user-select:none;user-select:none;touch-action:none;
}
#tap{position:fixed;inset:0;z-index:2}
canvas#viz{position:fixed;inset:0;z-index:1;pointer-events:none}

.ripple{position:fixed;width:40px;height:40px;border-radius:50%;transform:translate(-50%,-50%) scale(0);pointer-events:none;z-index:3;animation:rip 0.5s ease-out forwards}
@keyframes rip{0%{transform:translate(-50%,-50%) scale(0);opacity:0.5}100%{transform:translate(-50%,-50%) scale(4);opacity:0}}
.rdot{position:fixed;width:8px;height:8px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:3;animation:dotf 0.3s ease-out forwards}
@keyframes dotf{0%{opacity:0.7;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-50%) scale(0)}}

/* User-hit ghost markers */
.uhit{position:fixed;width:14px;height:14px;border-radius:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:4;opacity:0.35;transition:all 0.2s;mix-blend-mode:multiply}
.uhit.warn{opacity:0.95;transform:translate(-50%,-50%) scale(1.6);box-shadow:0 0 24px rgba(255,59,48,0.9);background:#FF3B30 !important}

.wm{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);font-family:monospace;font-size:11px;font-weight:500;letter-spacing:4px;color:#CCC;opacity:0.4;pointer-events:none;z-index:10}

/* Start screen — graffiti wall */
.start-wall{
  position:fixed;inset:0;z-index:50;
  background:#E8E4DE;
  cursor:pointer;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  transition:opacity 0.4s,transform 0.4s;
  overflow:hidden;
}
.start-wall::before{
  content:'';position:absolute;inset:0;
  opacity:0.15;
  background-image:url("data:image/svg+xml,%3Csvg width='200' height='200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence baseFrequency='0.7' numOctaves='4' type='fractalNoise'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
}
.start-wall.gone{opacity:0;transform:scale(1.1);pointer-events:none}

.graf-container{
  position:relative;
  width:min(90vw,420px);
  aspect-ratio:2.2;
}
.graf-text{width:100%;height:100%;filter:drop-shadow(4px 4px 0 rgba(0,0,0,0.15))}
.start-sub{
  font-size:14px;color:rgba(0,0,0,0.35);letter-spacing:3px;
  margin-top:20px;font-weight:500;
  animation:breathe 2s ease-in-out infinite;
  position:relative;z-index:1;
}
@keyframes breathe{0%,100%{opacity:0.35}50%{opacity:0.7}}
.speckle{
  position:absolute;inset:0;opacity:0.3;
  background-image:radial-gradient(circle,rgba(0,0,0,0.3) 1px,transparent 1px);
  background-size:8px 8px;pointer-events:none;
}

/* Genre strip */
.gstrip{
  position:fixed;bottom:0;left:0;right:0;z-index:20;
  height:48px;display:flex;align-items:center;
  overflow-x:auto;overflow-y:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
  padding:0 16px;gap:6px;
  background:linear-gradient(to top,rgba(250,250,248,0.95),rgba(250,250,248,0.7));
  backdrop-filter:blur(8px);
}
.gstrip::-webkit-scrollbar{display:none}
.gp{
  padding:7px 14px;border-radius:20px;border:1.5px solid #E0DDD8;background:white;
  font-size:11px;font-weight:600;color:#999;cursor:pointer;transition:all 0.2s;
  white-space:nowrap;flex-shrink:0;min-height:32px;
}
.gp:active{transform:scale(0.95)}
.gp.on{border-color:#FF6B35;color:#FF6B35;background:rgba(255,107,53,0.04)}

/* HYPE MAN — center-screen graffiti reaction text */
.hype-stage{position:fixed;inset:0;z-index:14;pointer-events:none;overflow:hidden}
.hype-burst{
  position:absolute;
  font-family:Impact,Haettenschweiler,'Arial Black',sans-serif;
  font-weight:900;
  font-style:italic;
  letter-spacing:-2px;
  white-space:nowrap;
  transform:translate(-50%,-50%);
  pointer-events:none;
  filter:drop-shadow(4px 4px 0 rgba(0,0,0,0.45)) drop-shadow(0 0 30px rgba(255,107,53,0.4));
  animation:hburst 1.4s cubic-bezier(0.16,1.2,0.3,1) forwards;
}
@keyframes hburst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.2) rotate(var(--rot,-3deg))}
  18%{opacity:1;transform:translate(-50%,-50%) scale(1.3) rotate(var(--rot,-3deg))}
  35%{transform:translate(-50%,-50%) scale(1) rotate(var(--rot,-3deg))}
  85%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(var(--rot,-3deg))}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.05) rotate(var(--rot,-3deg))}
}
.hype-splatter{
  position:absolute;width:6px;height:6px;border-radius:50%;
  pointer-events:none;
  animation:hsplat 1.2s ease-out forwards;
}
@keyframes hsplat{
  0%{opacity:0.8;transform:translate(0,0) scale(0)}
  20%{opacity:0.7;transform:translate(var(--dx,0),var(--dy,0)) scale(1)}
  100%{opacity:0;transform:translate(calc(var(--dx,0) * 1.4),calc(var(--dy,0) * 1.4)) scale(0.6)}
}

/* SIGNATURE — the brand drop. Bigger, longer, with gradient fill via background-clip */
.hype-burst.signature{
  font-size:clamp(80px,20vw,200px) !important;
  letter-spacing:-4px;
  background:linear-gradient(135deg,#FF3B30 0%,#FF9500 35%,#FFCC00 65%,#FF3B30 100%);
  -webkit-background-clip:text;background-clip:text;
  -webkit-text-fill-color:transparent;
  -webkit-text-stroke:4px #1A1A1A !important;
  filter:drop-shadow(6px 6px 0 rgba(0,0,0,0.55)) drop-shadow(0 0 60px rgba(255,107,53,0.7));
  animation:sigburst 1.9s cubic-bezier(0.16,1.4,0.3,1) forwards !important;
}
@keyframes sigburst{
  0%{opacity:0;transform:translate(-50%,-50%) scale(0.1) rotate(var(--rot,-5deg))}
  10%{opacity:1;transform:translate(-50%,-50%) scale(1.5) rotate(var(--rot,-5deg))}
  22%{transform:translate(-50%,-50%) scale(0.95) rotate(var(--rot,-5deg))}
  32%{transform:translate(-50%,-50%) scale(1.05) rotate(var(--rot,-5deg))}
  85%{opacity:1;transform:translate(-50%,-50%) scale(1) rotate(var(--rot,-5deg))}
  100%{opacity:0;transform:translate(-50%,-50%) scale(1.08) rotate(var(--rot,-5deg))}
}

/* Hide DBG button by default — Konami unlocks it */
.tb#dbgBtn{display:none}
.tb#dbgBtn.unlocked{display:inline-block}

/* Subtitles — flowing live transcript, big and proud */
.subs{
  position:fixed;left:0;right:0;bottom:64px;z-index:13;
  display:flex;align-items:center;justify-content:center;
  font-family:Impact,Haettenschweiler,'Arial Black',sans-serif;
  font-weight:900;font-style:italic;letter-spacing:-1px;
  padding:0 24px;
  pointer-events:none;
  opacity:0;transition:opacity 0.3s,filter 0.25s;
  height:64px;
  text-align:center;
  overflow:hidden;
}
.subs.on{opacity:1}
.subs.dim{opacity:0.25;filter:blur(0.5px)}
.subs-flow{
  display:flex;flex-wrap:nowrap;align-items:baseline;justify-content:flex-end;gap:0.4em;
  max-width:100%;overflow:hidden;
  font-size:clamp(22px,5.5vw,36px);
}
.sw{
  display:inline-block;
  color:#1A1A1A;
  text-shadow:2px 2px 0 rgba(255,255,255,0.6);
  animation:swin 0.32s cubic-bezier(0.16,1.3,0.3,1) forwards;
  white-space:nowrap;
  flex-shrink:0;
}
.sw.interim{color:rgba(26,26,26,0.5);font-style:italic}
.sw.hit{color:#FF3B30;animation:swhit 0.6s ease-out forwards}
@keyframes swin{
  0%{opacity:0;transform:translateY(8px) scale(0.85)}
  100%{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes swhit{
  0%{transform:scale(1)}
  30%{transform:scale(1.25);color:#FF3B30}
  100%{transform:scale(1);color:rgba(26,26,26,0.6)}
}

/* Top-right buttons */
.topbtns{position:fixed;top:12px;right:12px;z-index:22;display:flex;gap:8px}
.tb{
  padding:7px 12px;border-radius:18px;border:1.5px solid #E0DDD8;background:rgba(255,255,255,0.9);
  font-size:11px;font-weight:600;color:#666;cursor:pointer;transition:all 0.15s;
  letter-spacing:0.5px;
}
.tb:active{transform:scale(0.95)}
.tb.on{border-color:#FF6B35;color:#FF6B35;background:rgba(255,107,53,0.06)}
.tb.warn{border-color:#FF3B30;color:#FF3B30}
/* Mode toggle button — slightly bolder than other top buttons */
.tb.modebtn{font-weight:800;letter-spacing:1px;border-color:#FF3B30;color:#FF3B30;background:rgba(255,59,48,0.08)}
.tb.modebtn.boom{border-color:#FF9500;color:#FF9500;background:rgba(255,149,0,0.08)}

/* Share toast */
.share-toast{
  position:fixed;top:60px;right:14px;z-index:60;
  padding:10px 16px;border-radius:18px;
  background:#1A1A1A;color:#FFCC00;
  font-family:ui-monospace,Menlo,Consolas,monospace;
  font-size:12px;font-weight:700;letter-spacing:1.5px;
  opacity:0;transform:translateY(-8px);
  pointer-events:none;
  transition:opacity 0.25s,transform 0.25s;
  box-shadow:0 4px 14px rgba(0,0,0,0.18);
}
.share-toast.show{opacity:1;transform:translateY(0)}

/* DEBUG HUD */
.dbg{
  position:fixed;top:54px;left:12px;z-index:40;
  width:min(420px,calc(100vw - 24px));
  max-height:60vh;
  background:rgba(15,15,15,0.92);color:#0F0;
  font-family:ui-monospace,Menlo,Consolas,monospace;font-size:10px;
  padding:10px 12px;border-radius:8px;
  overflow-y:auto;overflow-x:hidden;
  display:none;backdrop-filter:blur(8px);
  border:1px solid rgba(0,255,0,0.2);
  pointer-events:auto;
}
.dbg.show{display:block}
.dbg-row{padding:2px 0;border-bottom:1px solid rgba(0,255,0,0.08);white-space:pre-wrap;word-break:break-word;line-height:1.35}
.dbg-row.interim{color:#888}
.dbg-row.final{color:#0F0}
.dbg-row.fire{color:#FF9500;font-weight:700}
.dbg-row.miss{color:#FF3B30}
.dbg-row.silent{color:#5AC8FA}
.dbg-row.system{color:#AF52DE}
.dbg-meta{display:inline-block;width:56px;color:#444;flex-shrink:0}
.dbg-clear-btn{position:sticky;top:0;float:right;background:rgba(255,59,48,0.2);color:#FF6B6B;border:1px solid rgba(255,59,48,0.4);font-family:inherit;font-size:9px;padding:2px 6px;border-radius:3px;cursor:pointer;margin-bottom:4px}

/* Mic prompt */
.micp{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0.9);
  display:flex;flex-direction:column;align-items:center;gap:14px;
  z-index:30;opacity:0;pointer-events:none;transition:all 0.4s cubic-bezier(0.34,1.56,0.64,1);
  background:rgba(255,255,255,0.96);padding:24px 32px;border-radius:20px;
  box-shadow:0 8px 30px rgba(0,0,0,0.18);
  backdrop-filter:blur(10px);
}
.micp.show{opacity:1;pointer-events:auto;transform:translate(-50%,-50%) scale(1)}
.micb{width:64px;height:64px;border-radius:50%;border:none;background:#1A1A1A;color:white;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,0,0,0.2);transition:transform 0.15s}
.micb:active{transform:scale(0.93)}
.mictxt{font-size:13px;color:#444;letter-spacing:0.5px;font-weight:500;text-align:center}
.micsub{font-size:11px;color:#999;letter-spacing:0.5px;text-align:center;max-width:220px;line-height:1.5}

/* Tempo indicator */
.tempo-ind{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:25;font-family:Impact,sans-serif;font-size:80px;font-weight:900;font-style:italic;
  color:#1A1A1A;opacity:0;pointer-events:none;transition:opacity 0.2s;
  letter-spacing:-3px;
}
.tempo-ind.show{opacity:0.85}
.tempo-ind .bpm-label{font-size:18px;font-weight:600;font-style:normal;letter-spacing:2px;display:block;text-align:center;opacity:0.5}

/* Volume pinch indicator */
.vol-ind{
  position:fixed;top:50%;right:30px;transform:translateY(-50%);
  width:6px;height:200px;background:rgba(0,0,0,0.1);border-radius:3px;
  z-index:25;opacity:0;transition:opacity 0.3s;pointer-events:none;
}
.vol-ind.show{opacity:1}
.vol-fill{position:absolute;bottom:0;left:0;right:0;background:#FF6B35;border-radius:3px;transition:height 0.05s linear}

/* Scratch indicator */
.scratch-ind{
  position:fixed;left:50%;top:50%;transform:translate(-50%,-50%);
  z-index:25;font-family:Impact,sans-serif;font-size:48px;font-weight:900;font-style:italic;
  color:#FF6B35;opacity:0;pointer-events:none;transition:opacity 0.15s;
  letter-spacing:-2px;text-shadow:3px 3px 0 rgba(0,0,0,0.2);
}
.scratch-ind.show{opacity:0.95}

</style>
</head>
<body>

<canvas id="viz"></canvas>

<!-- Start Wall -->
<div class="start-wall" id="startWall" onclick="dropBeat()">
  <div class="graf-container">
    <svg class="graf-text" viewBox="0 0 440 160" xmlns="http://www.w3.org/2000/svg">
      <text x="224" y="128" text-anchor="middle" font-family="Impact,Haettenschweiler,sans-serif" font-size="130" font-weight="900" font-style="italic" fill="rgba(0,0,0,0.1)" transform="skewX(-5)">AD-LIB</text>

<script>
// ============================================================
// AUDIO CORE
// ============================================================
var ac=null,master=null,beatAn=null,padGain=null,subGain=null,beatBus=null,hypeBus=null;
var audioUnlocked=false;
var COLORS=['#FF3B30','#FF9500','#FFCC00','#34C759','#5AC8FA','#007AFF','#AF52DE','#FF2D55'];
var W=window.innerWidth,H=window.innerHeight;
window.addEventListener('resize',function(){W=window.innerWidth;H=window.innerHeight});

function getAC(){
  try{if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();
  if(ac.state==='suspended')ac.resume();}catch(e){}
  return ac;
}
function getM(){
  var c=getAC();if(!c)return null;
  if(!master){
    var comp=c.createDynamicsCompressor();comp.threshold.value=-10;comp.knee.value=8;comp.ratio.value=4;comp.attack.value=0.003;comp.release.value=0.15;

  var sub=c.createOscillator();sub.type='sine';sub.frequency.setValueAtTime(60,t);sub.frequency.exponentialRampToValueAtTime(35,t+0.3);
  var sg=c.createGain();sg.gain.setValueAtTime(0.5,t);sg.gain.exponentialRampToValueAtTime(0.001,t+0.4);
  sub.connect(sg).connect(m);sub.start(t);sub.stop(t+0.45);
}

// RIFF FX — jazzy, improvisational. Two-note saxophone-ish stab. For "RIFF!" reactions.
function fxRiff(){
  var c=getAC(),t=c.currentTime,m=getHypeOut();
  var notes=[mf(67),mf(70),mf(74)]; // G, Bb, D — minor third + perfect fifth, jazzy
  notes.forEach(function(f,i){
    var st=t+i*0.09;
    var o=c.createOscillator();o.type='sawtooth';o.frequency.value=f;
    var g=c.createGain();g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(0.1,st+0.02);g.gain.exponentialRampToValueAtTime(0.001,st+0.25);
    var bp=c.createBiquadFilter();bp.type='bandpass';bp.frequency.value=900;bp.Q.value=3;
    o.connect(bp).connect(g).connect(m);o.start(st);o.stop(st+0.28);
  });
}

function initPat(){var p=[];for(var i=0;i<8;i++){p.push([]);for(var j=0;j<16;j++)p[i].push(false)}return p}
recPat=initPat();userHits=initPat();

function loadGenre(){
  var d=G().p;
  recPat=initPat();
  for(var r=0;r<d.length;r++)for(var s=0;s<16;s++)recPat[r][s]=!!d[r][s];
  // SESSION MUTATION: kick/snare/clap backbone (rows 0-3) is the genre's
  // identity — untouched. Hats and perc (rows 4-7) get a fresh roll of
  // ghost hits every load so the same genre never plays the same twice.
  for(var r=4;r<8&&r<recPat.length;r++){
    for(var s=0;s<16;s++){
      if(recPat[r][s]){
        if(s%4!==0&&Math.random()<0.12)recPat[r][s]=false; // thin an off-beat
      }else{
        if(Math.random()<0.08)recPat[r][s]=true; // sprinkle a ghost
      }
    }
  }
  for(var r=0;r<7;r++)for(var s=0;s<16;s++){if(userHits[r][s])recPat[r][s]=true}
  tempo=G().t;
}

function addUserMarker(row,step,x,y,color){
  // Remove any existing marker for the same row+step
  for(var i=userHitMarkers.length-1;i>=0;i--){
    if(userHitMarkers[i].row===row&&userHitMarkers[i].step===step){
      try{userHitMarkers[i].el.remove()}catch(e){}
      userHitMarkers.splice(i,1);
    }
  }
  var el=document.createElement('div');el.className='uhit';el.style.left=x+'px';el.style.top=y+'px';el.style.background=color;
  document.body.appendChild(el);
  userHitMarkers.push({row:row,step:step,x:x,y:y,color:color,el:el});
  document.getElementById('resetBtn').style.display='block';
}
function removeUserMarker(marker){
  try{marker.el.remove()}catch(e){}
  var idx=userHitMarkers.indexOf(marker);
  if(idx>=0)userHitMarkers.splice(idx,1);
  userHits[marker.row][marker.step]=false;
  recPat[marker.row][marker.step]=!!G().p[marker.row][marker.step];
  if(userHitMarkers.length===0)document.getElementById('resetBtn').style.display='none';
}
function findNearestUserMarker(x,y,maxDist){
  var best=null,bestD=maxDist*maxDist;
  for(var i=0;i<userHitMarkers.length;i++){
    var m=userHitMarkers[i];
    var dx=m.x-x,dy=m.y-y;var d=dx*dx+dy*dy;
    if(d<bestD){bestD=d;best=m}
  }
  return best;
}

var TOD_BUCKETS=[
  {start:6, end:12, genres:['lofi','soul','rnb']},          // morning coffee
  {start:12,end:17, genres:['boombap','golden','funk','gfunk']}, // workday classic
  {start:17,end:21, genres:['pop','afro','disco','reggaeton']}, // going-out energy
  {start:21,end:26, genres:['hyphy','trap','drill','jersey']},  // late-night chaos (21-26 = 9pm-2am)
  {start:2, end:6,  genres:['lofi','ukgarage','trap']}       // after-hours
];
var BACKUP_BUCKET=['boombap','lofi','soul','rnb','funk','gfunk','pop','afro'];

function pickGenreForTimeOfDay(){
  var hr=new Date().getHours();
  // WILDCARD: 25% of sessions ignore the clock entirely — time-of-day sets
  // the vibe, but the same hour shouldn't guarantee the same lane.
  if(Math.random()<0.25){
    var all=Object.keys(GEN);
    return all[Math.floor(Math.random()*all.length)];
  }
  // Normalize hour for buckets that wrap past midnight (21-26 means 21-25 + 0-1)
  for(var i=0;i<TOD_BUCKETS.length;i++){
    var b=TOD_BUCKETS[i];
    var h=hr;
    var inWindow=false;
    if(b.end>24){
      // Wraps midnight
      if(hr>=b.start||hr<(b.end-24))inWindow=true;
    }else{
      if(hr>=b.start&&hr<b.end)inWindow=true;
    }
    if(inWindow&&b.genres.length>0){
      return b.genres[Math.floor(Math.random()*b.genres.length)];
    }
  }
  return BACKUP_BUCKET[Math.floor(Math.random()*BACKUP_BUCKET.length)];
}

// Track per-session randomization so genre switches mid-session also get fresh character
var keyOffset=0;       // semitones to transpose root from genre default
var padInversion=0;    // 0 = normal, 1 = inverted

// Re-randomize key offset and pad inversion. Called on initial load AND every genre change.
function randomizeCharacter(){
  // Key offset: ±7 semitones from default. Use a Gaussian-ish bias toward small offsets.
  // Random integer in [-7, 7] but biased toward 0 — most picks are within ±3 to keep pad/bass
  // in comfortable register, occasional bigger jumps for variety.
  var r=(Math.random()+Math.random()+Math.random())/3; // bell curve 0-1
  keyOffset=Math.round((r*2-1)*7);
  // Pad inversion: 50/50
  padInversion=Math.random()<0.5?1:0;
}

      try{pills[i].scrollIntoView({behavior:'instant',block:'nearest',inline:'center'})}catch(e){
        // older browsers
        try{pills[i].scrollIntoView()}catch(e2){}
      }
      break;
    }
  }
}

// KONAMI CODE — unlock DBG button
// Sequence: ↑ ↑ ↓ ↓ ← → ← → B A
// On mobile: 10 rapid taps in the top-left corner (within 64px square, 5s window)
// ============================================================
var konamiSeq=['ArrowUp','ArrowUp','ArrowDown','ArrowDown','ArrowLeft','ArrowRight','ArrowLeft','ArrowRight','b','a'];
var konamiPos=0;
var konamiCornerTaps=[];
function initKonami(){
  document.addEventListener('keydown',function(e){
    var k=e.key;

    // Mode toggle shortcut: M
    if(k==='m'||k==='M'){
      if(audioUnlocked)toggleMode();
      return;
    }

    // Konami sequence
    if(k===konamiSeq[konamiPos]||k.toLowerCase()===konamiSeq[konamiPos]){
      konamiPos++;
      if(konamiPos===konamiSeq.length){
        unlockDbg();
        konamiPos=0;
      }
    }else{
      // Reset, but allow this key to start a new attempt
      konamiPos=(k===konamiSeq[0])?1:0;
    }
  });
  // Mobile easter egg: 10 rapid taps in top-left 64px corner
  document.addEventListener('touchstart',function(e){
    var t=e.changedTouches[0];
    if(!t)return;
    if(t.clientX>64||t.clientY>64)return;
    var now=Date.now();
    konamiCornerTaps.push(now);
    konamiCornerTaps=konamiCornerTaps.filter(function(ts){return now-ts<5000});
    if(konamiCornerTaps.length>=10){
      unlockDbg();
      konamiCornerTaps=[];
    }
  });
}

// iOS Safari requires every <audio> element to have play() invoked from within a
// user gesture before it can play in the background. We do the play+immediate-pause
// trick here, which "unlocks" each element for later silent playback on triggers.
var audioElementsPrimed=false;
function primeAudioForIOS(){
  if(audioElementsPrimed)return;
  audioElementsPrimed=true;
  // Walk every audio element we know about and prime it
  var primed=0,failed=0;
  for(var key in audioCache){
    var arr=audioCache[key]||[];
    for(var i=0;i<arr.length;i++){
      (function(a){
        try{
          a.muted=true; // play silently during the prime
          var p=a.play();
          if(p&&p.then){
            p.then(function(){a.pause();a.currentTime=0;a.muted=false;primed++})
             .catch(function(){failed++;a.muted=false});
          }else{
            // legacy — assume it worked
            a.pause();a.currentTime=0;a.muted=false;primed++;
          }
        }catch(e){failed++}
      })(arr[i]);
    }
  }
  // Some audio elements might not have loaded yet; re-prime once they've cached.
  // We do another pass after a short delay to catch late-loaders.
  setTimeout(function(){
    for(var key in audioCache){
      var arr=audioCache[key]||[];
      for(var i=0;i<arr.length;i++){
        if(!arr[i]._primed){
          (function(a){
            try{
              a.muted=true;
              var p=a.play();
              if(p&&p.then){
                p.then(function(){a.pause();a.currentTime=0;a.muted=false;a._primed=true})
                 .catch(function(){a.muted=false});
              }
            }catch(e){}
          })(arr[i]);
        }
      }
    }
    dbgLog('system','iOS audio primed (primary='+primed+', failed='+failed+')');
  },800);
}

// SCRATCH ENGINE — pitch+tempo bend (Style 1+3 hybrid)
// Real reverse playback of synth events is impractical, so we do:
// horizontal velocity → tempo speed (can go negative → time-stretch reverse feel via duck+pitch)
// vertical position → pitch bend on master

function startScratch(){
  if(!audioUnlocked)return;
  scratchOrigTempo=tempo;

  // Duck the live beat — scratch sound takes over visually & sonically
  if(beatBus){var c=getAC();beatBus.gain.cancelScheduledValues(c.currentTime);beatBus.gain.linearRampToValueAtTime(beatVolume*0.25,c.currentTime+0.05)}

  if(!audioUnlocked)return;
  var now=Date.now();

    var dx=center.x-lastScratchPos.x;
    var dy=center.y-lastScratchPos.y;
    var dt=Math.max(16,now-lastScratchTime);
    var vx=dx/dt; // px per ms
    // Trigger scratch sounds on sudden direction changes / velocity spikes
    var speed=Math.sqrt(dx*dx+dy*dy)/dt;
    if(speed>0.8&&now-lastScratchTime>80){

      fxScratchAt(vx);
      lastScratchTime=now;
    }

    lastScratchTime=now;
  }

  // Vertical position relative to start = pitch bend
  var dyTotal=center.y-startCenter.y;
  var pitchBend=Math.max(-12,Math.min(12,-dyTotal/30)); // up = higher
  // Apply via a temporary playbackRate on... hmm, hard with synth. We'll skip live pitch bend on master.
  // Instead, encode the pitch in the next scratch sound triggers.
  scratchPitchOffset=pitchBend;
}

// ============================================================

  if(!playing)return;
  if(!ac){tmrID=setTimeout(sched,50);return}
  var c=ac;
  while(nextT<c.currentTime+0.1){
    curStep=(curStep+1)%16;
    if(curStep===0){loopSt=nextT;barCount++;setChord(barCount)}
    // SWING: delay every off-16th by the genre's swing amount.
    // 0.50 = straight (trap/drill/jersey), 0.58 = classic MPC boom bap,
    // 0.62 = lofi drag. The grid (nextT/loopSt) stays straight so tap
    // quantization and the hype pocket stay locked.
    var stepDur=60/tempo/4;
    var sw=G().sw||0.5;
    var swT=nextT+((curStep%2===1)?((sw-0.5)*2*stepDur):0);
    pStep(curStep,swT);
    nextT+=stepDur;
  }
  tmrID=setTimeout(sched,20);
}

  if(!audioUnlocked)return;
  var c=ac,delay=Math.max(0,time-c.currentTime)*1000;
  var pat=recPat;
  var fns=[
    function(t,v){return playZ(0.25,0.85,t,v)},function(t,v){return playZ(0.75,0.85,t,v)},
    function(t,v){return playZ(0.25,0.55,t,v)},function(t,v){return playZ(0.75,0.55,t,v)},
    function(t,v){return playZ(0.25,0.05,t,v)},function(t,v){return playZ(0.75,0.05,t,v)},
    function(t,v){return playZ(0.25,0.3,t,v)},function(t,v){return playZ(0.75,0.3,t,v)}
  ];
  var pos=[
    [W*0.25,H*0.85],[W*0.75,H*0.85],
    [W*0.25,H*0.55],[W*0.75,H*0.55],
    [W*0.25,H*0.05],[W*0.75,H*0.05],
    [W*0.25,H*0.3],[W*0.75,H*0.3]
  ];

  // (rows 4+); kicks/snares keep their programmed weight.
  var vel=step%4===0?1.0:(step%2===0?0.82:0.58);

    var v=r>=4?vel:1.0;
    var res=fns[r](time,v);

    // PEAK-HEAT HAT ROLLS: when the rapper is locked in (heat>70), closed
    // hats double into 32nds on the back half of each beat — the DJ
    // responding to the flow.
    if(r===4&&heat>70&&step%4===2){

  // MELODY RIDES THE HEAT: when the mic is live, the lead sits out until
  // you bring energy (heat>15) — the beat opens sparse and builds with
  // your flow. Without the mic, full arrangement plays.
  if(melActive){

  if(fired.length){
    setTimeout(function(){
      for(var i=0;i<fired.length;i++){
        var f=fired[i];
        addRip(pos[f.r][0]+(Math.random()-0.5)*20,pos[f.r][1]+(Math.random()-0.5)*20,f.color);

  var ml=0;if(micAn&&micOn){var td=new Uint8Array(micAn.fftSize);micAn.getByteTimeDomainData(td);var sum=0;for(var i=0;i<td.length;i++){var v=(td[i]-128)/128;sum+=v*v}ml=Math.sqrt(sum/td.length)*4}
  var bp=bass*30;vizX.fillStyle='rgb('+(250-bp)+','+(250-bp*0.8)+','+(248-bp*0.7)+')';vizX.fillRect(0,0,W,H);
  wOff+=0.02;
  [[H*0.85,20+bass*60,0.008,255,59,48,0.06+bass*0.08,1],[H*0.8,15+bass*40,0.012,255,149,0,0.04+bass*0.06,1.3],[H*0.75,10+mid*30,0.015,175,82,222,0.03+mid*0.05,0.8]].forEach(function(L){vizX.beginPath();vizX.moveTo(0,H);for(var x=0;x<=W;x+=3){vizX.lineTo(x,L[0]+Math.sin(x*L[2]+wOff*L[7])*L[1]+Math.sin(x*L[2]*1.5+wOff*L[7]*0.7)*L[1]*0.4)}vizX.lineTo(W,H);vizX.closePath();vizX.fillStyle='rgba('+L[3]+','+L[4]+','+L[5]+','+L[6]+')';vizX.fill()});
  for(var i=0;i<parts.length;i++){var p=parts[i];p.x+=p.vx+mid*(Math.random()-0.5)*2;p.y+=p.vy+high*(Math.random()-0.5)*1.5;if(p.x<0)p.x=W;if(p.x>W)p.x=0;if(p.y<0)p.y=H;if(p.y>H)p.y=0;vizX.beginPath();vizX.arc(p.x,p.y,p.r*(1+high*3),0,Math.PI*2);vizX.fillStyle=p.c;vizX.globalAlpha=Math.min(1,p.a+high*0.2);vizX.fill();vizX.globalAlpha=1}
  if(micOn&&ml>0.01&&micAn){var td2=new Uint8Array(micAn.fftSize);micAn.getByteTimeDomainData(td2);var cy=H*0.45,wh=H*0.15;vizX.beginPath();vizX.strokeStyle='rgba(255,59,48,'+Math.min(0.5,ml*0.8)+')';vizX.lineWidth=2;var st=Math.max(1,Math.floor(td2.length/W*2));for(var i=0;i<td2.length;i+=st){var x2=(i/td2.length)*W,v2=(td2[i]-128)/128,y2=cy+v2*wh*ml*3;if(i===0)vizX.moveTo(x2,y2);else vizX.lineTo(x2,y2)}vizX.stroke()}
}

// ============================================================
// MICROPHONE + SPEECH RECOGNITION (the heart of the hype man)
// ============================================================
var micStr=null,micAn=null,micOn=false;
var recognition=null,recogActive=false;
var rmsHistory=[];

// Flow-aware reaction state
var lastReactionTs=0,lastHeavyReactionTs=0;
var reactedWords={}; // word -> ts of last reaction (4s expiry, allows re-fire after window)

// Signature triggers: track recent reactions for multi-keyword streaks
var recentReactionTs=[]; // timestamps of all recent hype fires
var lastSignatureTs=0;
var lastFinalWordTs=0;   // when the last final word came in (for end-of-phrase detection)
var wordsInWindow=[];    // {word, ts} sliding window for syllable/multisyllabic detection
var pendingPauseRespect=false; // set after a heater word, fires a soft hit if rapper pauses

// ============================================================
// HEAT — the energy arc. A real hype man builds a set, he doesn't
// react at one flat intensity. Heat rises with flow density and
// keyword fires, decays in silence. Heat drives:
//   • selectivity (high heat = fewer, BIGGER reactions)
//   • burst scale + splatter count
//   • signature cooldown (peaks come faster when you're cooking)
//   • echo chattiness (he fills space early, gets locked-in late)
var heat=0,lastHeatTickTs=Date.now();
function bumpHeat(amt){heat=Math.min(100,heat+amt)}
setInterval(function(){
  var now=Date.now(),dt=(now-lastHeatTickTs)/1000;lastHeatTickTs=now;
  var talking=rmsHistory.length&&(now-rmsHistory[rmsHistory.length-1].ts<600)&&rmsHistory[rmsHistory.length-1].rms>0.05;
  // Slow burn-off while flowing, fast cool-down in silence
  heat=Math.max(0,heat-dt*(talking?1.0:6.5));
},500);

// CATEGORY MEMORY — call-and-response. Track per-category hits in a
// rolling window so the 2nd/3rd time you hit a theme, he escalates
// instead of repeating himself.
var catHits={}; // slug -> {count, ts}
function noteCatHit(slug){
  var now=Date.now();
  var c=catHits[slug];
  if(!c||now-c.ts>30000){catHits[slug]={count:1,ts:now};return 1}
  c.count++;c.ts=now;return c.count;
}

// Subtitle flow state — words rendered as DOM nodes, scrolled via flexbox
var subsWords=[];    // {text, el, isFinal, kind} — most recent first in DOM, oldest at left
var MAX_SUB_WORDS=10; // how many words visible at once
var lastInterimSet=[]; // current interim words (replaced as recognizer updates)

function startMic(){
  // Raw capture: default constraints (echoCancellation on) push iOS into
  // voice-chat session mode, which DUCKS our own beat output around voice
  // activity — drums vanish, sustained pad survives. Raw mode keeps the
  // session in normal playback. Tradeoff: on phone speaker the analyser
  // hears some beat bleed, so RMS reads slightly hotter on iOS.
  navigator.mediaDevices.getUserMedia({audio:{echoCancellation:false,noiseSuppression:false,autoGainControl:false}}).then(function(stream){
    micStr=stream;
    var ctx=getAC(),src=ctx.createMediaStreamSource(stream);
    micAn=ctx.createAnalyser();micAn.fftSize=2048;micAn.smoothingTimeConstant=0.8;
    src.connect(micAn);
    micOn=true;
    document.getElementById('micp').classList.remove('show');
    startSpeechRecog();
    monitorRMS();
    fireHype({text:'LET HIM COOK',fx:fxAirhorn,color:'#FF6B35'},'heavy');
  }).catch(function(err){
    document.getElementById('mictxt').textContent='mic permission denied';
    document.getElementById('micsub').textContent='enable microphone access and reload to use AD-LIB hype mode';
  });
}

function startSpeechRecog(){
  var SR=window.webkitSpeechRecognition||window.SpeechRecognition;
  if(!SR){
    var b=document.getElementById('modeBtn');if(b){b.textContent='NO SPEECH';b.classList.add('warn')}
    return;
  }
  recognition=new SR();
  recognition.continuous=true;
  recognition.interimResults=true;
  recognition.lang='en-US';
  recognition.maxAlternatives=3; // get fuzzy alternatives so we can match against multiple guesses
  var lastResultTs=Date.now();
  recognition.onresult=function(evt){
    var now=Date.now();
    var gap=now-lastResultTs;
    lastResultTs=now;

    // Process every result to keep up with flow — interim AND final
    var allInterimWords=[];
    var newFinalWords=[];
    var rawInterim='',rawFinal='';
    var alts=[];
    for(var i=evt.resultIndex;i<evt.results.length;i++){
      var r=evt.results[i];
      var txt=r[0].transcript;
      var ws=txt.toLowerCase().replace(/[^a-z\s']/g,'').split(/\s+/).filter(Boolean);
      if(r.isFinal){
        for(var j=0;j<ws.length;j++)newFinalWords.push(ws[j]);
        rawFinal+=txt+' ';
        // Capture alternative interpretations from final results for fuzzy matching
        for(var k=1;k<r.length&&k<3;k++){
          if(r[k]&&r[k].transcript)alts.push(r[k].transcript);
        }
      }else{
        for(var j=0;j<ws.length;j++)allInterimWords.push(ws[j]);
        rawInterim+=txt+' ';
      }
    }

    // DBG: log raw recognizer output + gap since last event
    if(rawFinal)dbgLog('final','FINAL ['+gap+'ms gap]: "'+rawFinal.trim()+'"'+(alts.length?' | alts: '+alts.join(' / '):''));
    if(rawInterim)dbgLog('interim','interim ['+gap+'ms gap]: "'+rawInterim.trim()+'"');

    // Apply finals first (locks them in), then interim (transient tail)
    if(newFinalWords.length>0){
      for(var i=0;i<newFinalWords.length;i++){
        addSubWord(newFinalWords[i],true);
        considerWordForHype(newFinalWords[i],true);
      }
      // Also test alternative interpretations from final results — Chrome's 2nd/3rd guesses
      // sometimes catch slang the primary missed. KEYWORD MATCHES ONLY: an alt is a
      // guess about what you said — echoing an unspoken word back kills credibility.
      for(var k=0;k<alts.length;k++){
        var altWords=alts[k].toLowerCase().replace(/[^a-z\s']/g,'').split(/\s+/).filter(Boolean);
        for(var w=0;w<altWords.length;w++){
          if(newFinalWords.indexOf(altWords[w])<0&&isKeywordWord(altWords[w])){
            considerWordForHype(altWords[w],true);
          }
        }
      }
    }
    // Refresh interim tail
    refreshInterim(allInterimWords);
    // React on EVERY interim word we haven't seen yet — not just the latest.
    // Track which interim words we've already passed to consider, to avoid re-checking.
    if(allInterimWords.length>0){
      for(var i=0;i<allInterimWords.length;i++){
        var w=allInterimWords[i];
        if(!interimSeen[w]||now-interimSeen[w]>3000){
          interimSeen[w]=now;
          considerWordForHype(w,false);
        }
      }
    }
  };
  recognition.onerror=function(e){
    dbgLog('miss','RECOG ERROR: '+e.error);
    if(e.error==='not-allowed'||e.error==='service-not-allowed'){
      var b=document.getElementById('modeBtn');if(b){b.textContent='MIC BLOCKED';b.classList.add('warn')}
    }
  };
  recognition.onend=function(){
    dbgLog('system','recog ended (auto-restart='+recogActive+')');
    if(recogActive){
      try{recognition.start()}catch(e){setTimeout(function(){if(recogActive)try{recognition.start()}catch(e){}},250)}
    }
  };
  recognition.onstart=function(){dbgLog('system','recog started')};
  recognition.onspeechstart=function(){dbgLog('system','speech detected')};
  recognition.onspeechend=function(){dbgLog('system','speech ended (silence)')};
  try{recognition.start();recogActive=true;dbgLog('system','recognition initialized — maxAlts=3, continuous=true, interim=true')}catch(e){dbgLog('miss','recog start failed: '+e)}

  // Periodic kick-restart: every 4s, if no interim has come through in 1.5s+
  // while we KNOW you're talking (RMS high), force-restart to flush Chrome's buffer.
  setInterval(function(){
    if(!recogActive||!micOn)return;
    var now=Date.now();
    var quietDur=now-lastResultTs;
    // Are you currently talking? (recent RMS)
    var recentRMS=0,recentCount=0;
    for(var i=rmsHistory.length-1;i>=0&&i>=rmsHistory.length-6;i--){
      recentRMS+=rmsHistory[i].rms;recentCount++;
    }
    var avgRMS=recentCount?recentRMS/recentCount:0;
    if(quietDur>1800&&avgRMS>0.05){
      dbgLog('system','FORCE-RESTART: '+quietDur+'ms no interim while RMS='+avgRMS.toFixed(3));
      try{recognition.stop()}catch(e){}
      // onend will auto-restart
    }
  },2000);
}

// Track which interim words we've already passed to considerWordForHype this session
var interimSeen={};

// Fast keyword membership test (built once) — used to filter alt-guesses
var _kwSet=null;
function isKeywordWord(w){
  if(!_kwSet){
    _kwSet={};
    for(var i=0;i<KEYWORDS.length;i++)for(var j=0;j<KEYWORDS[i].words.length;j++)_kwSet[KEYWORDS[i].words[j]]=true;
  }
  return !!_kwSet[w];
}

// Add a word to the subtitle flow (right-aligned, oldest scrolls off left)
function addSubWord(word,isFinal){
  if(!word||word.length===0)return;
  var flow=document.getElementById('subsFlow');
  var el=document.createElement('span');
  el.className='sw';
  el.textContent=word;
  flow.appendChild(el);
  subsWords.push({text:word,el:el,isFinal:isFinal,interim:!isFinal});
  // Trim
  while(subsWords.length>MAX_SUB_WORDS){
    var old=subsWords.shift();
    try{old.el.remove()}catch(e){}
  }
  return el;
}

// Replace the trailing interim words with the latest interim guess
function refreshInterim(interimWords){
  // Remove existing interim words from the tail
  while(subsWords.length&&subsWords[subsWords.length-1].interim){
    var last=subsWords.pop();
    try{last.el.remove()}catch(e){}
  }
  // Append new interim words
  var flow=document.getElementById('subsFlow');
  for(var i=0;i<interimWords.length;i++){
    var el=document.createElement('span');
    el.className='sw interim';
    el.textContent=interimWords[i];
    flow.appendChild(el);
    subsWords.push({text:interimWords[i],el:el,isFinal:false,interim:true});
  }
  // Trim from the front if too many total
  while(subsWords.length>MAX_SUB_WORDS){
    var old=subsWords.shift();
    try{old.el.remove()}catch(e){}
  }
  lastInterimSet=interimWords;
}

// Highlight a subtitle word when it triggers a hype reaction
function flashSubWord(word){
  // Find the most recent matching word in subsWords
  for(var i=subsWords.length-1;i>=0;i--){
    if(subsWords[i].text===word){
      subsWords[i].el.classList.add('hit');
      break;
    }
  }
}

function toggleSubs(){
  subsVisible=!subsVisible;
  document.getElementById('subs').classList.toggle('on',subsVisible);
  document.getElementById('subsBtn').classList.toggle('on',subsVisible);
}

// Toggle voice mode (button + keyboard shortcut M)
function toggleMode(){
  hypeMode=hypeMode==='hype'?'boom':'hype';
  onModeChange();
}

// Share AD-LIB — uses native share sheet on mobile, falls back to clipboard copy on desktop
function shareApp(){
  var shareUrl=window.location.origin&&window.location.origin.indexOf('localhost')<0
    ?window.location.origin
    :'https://adlib.live';
  var shareData={
    title:'AD-LIB',
    text:'AD-LIB is your AI hype man. Drop a beat. Spit your bars. Get hyped.',
    url:shareUrl
  };

function copyToClipboard(text){
  var ok=false;
  try{
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text);ok=true;
    }else{
      // legacy fallback
      var ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';
      document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);ok=true;
    }
  }catch(e){}
  if(ok)showShareToast();
}
function showShareToast(){
  var t=document.getElementById('shareToast');
  t.classList.add('show');
  clearTimeout(showShareToast._t);
  showShareToast._t=setTimeout(function(){t.classList.remove('show')},1800);
}

// Consider a single word — fire hype if it matches a keyword and we haven't recently
function considerWordForHype(word,isFinal){
  if(!word||word.length<2)return;
  var now=Date.now();
  var src=isFinal?'F':'i';

  // Track word in sliding window for streak/multisyllabic detection
  wordsInWindow.push({word:word,ts:now,isFinal:isFinal,syllables:countSyllables(word)});
  // Trim window to last 6 seconds
  while(wordsInWindow.length&&now-wordsInWindow[0].ts>6000)wordsInWindow.shift();

  if(isFinal)lastFinalWordTs=now;

  // Tight global cooldown — keeps it from machine-gunning
  if(now-lastReactionTs<250){
    dbgLog('miss','['+src+'] "'+word+'" — global cooldown ('+(now-lastReactionTs)+'ms)');
    return;
  }

  // Repeat-word handling. Repetition is a FLOW TECHNIQUE, not noise.
  // 1st repeat inside the window: hold (don't parrot).
  // 2nd repeat (word said 3x): THROWBACK — shout their own word back at em.
  var rep=reactedWords[word];
  if(rep&&now-rep.ts<4000){
    rep.count++;rep.ts=now;
    if(rep.count===3&&now-lastReactionTs>300){
      var up=word.toUpperCase();
      dbgLog('fire','THROWBACK: "'+word+'" x3 — running it back');
      fireHype({text:up+'! '+up+'! '+up+'!',fx:fxHorn,color:'#FF3B30',audio:'gooff',keepText:true},'heavy');
      flashSubWord(word);
      bumpHeat(10);
      lastReactionTs=now;lastHeavyReactionTs=now;
      recentReactionTs.push(now);
      while(recentReactionTs.length&&now-recentReactionTs[0]>6000)recentReactionTs.shift();
    }else{
      dbgLog('miss','['+src+'] "'+word+'" — repeat #'+rep.count+' (holding)');
    }
    return;
  }

  // Every word you spit feeds the heat — flow density warms him up
  bumpHeat(0.5);

  // Check for SIGNATURE upgrade trigger:
  //   1. Multi-keyword streak (3+ reactions in 6s) — check before normal logic so it doesn't get eaten
  //   2. Multisyllabic streak (8+ syllables in <2s)
  //   3. Word is in SIGNATURE_UPGRADE_WORDS (random chance to escalate)
  //   4. Idle drop (35-45s of active rapping with no signature)
  // Signature has its own cooldown — at most 1 every 10s cold,
  // tightening to ~6s when heat is peaked (peaks come faster mid-set)
  var sigCooldown=10000-heat*40;
  if(now-lastSignatureTs>sigCooldown){
    var sigReason=null;

    // (1) Multi-keyword streak
    var recentCount=0;
    for(var i=0;i<recentReactionTs.length;i++){
      if(now-recentReactionTs[i]<6000)recentCount++;
    }
    if(recentCount>=3)sigReason='3+ reactions in 6s';

    // (2) Multisyllabic streak — sum syllables in last 2s
    if(!sigReason){
      var sylCount=0;
      for(var i=wordsInWindow.length-1;i>=0;i--){
        if(now-wordsInWindow[i].ts>2000)break;
        sylCount+=wordsInWindow[i].syllables;
      }
      if(sylCount>=8)sigReason=sylCount+' syllables in 2s';
    }

    // (3) Idle drop — been rapping (recent words) but no signature in 35-45s
    if(!sigReason&&lastSignatureTs>0&&now-lastSignatureTs>35000&&wordsInWindow.length>=8){
      // Random within 35-45s window
      if(Math.random()<0.04)sigReason='idle drop ('+Math.round((now-lastSignatureTs)/1000)+'s)';
    }

    // (4) Random upgrade on heater words
    if(!sigReason&&SIGNATURE_UPGRADE_WORDS.indexOf(word)>=0&&Math.random()<0.30){
      sigReason='heater upgrade on "'+word+'"';
    }

    if(sigReason){
      var sig=SIGNATURE_REACTIONS[Math.floor(Math.random()*SIGNATURE_REACTIONS.length)];
      dbgLog('fire','SIGNATURE: '+sig.text+' ['+sigReason+'] heat='+Math.round(heat));
      fireHype(sig,'heavy');
      flashSubWord(word);
      bumpHeat(15);
      reactedWords[word]={ts:now,count:1};
      lastReactionTs=now;
      lastHeavyReactionTs=now;
      lastSignatureTs=now;
      recentReactionTs.push(now);
      // Trim recentReactionTs
      while(recentReactionTs.length&&now-recentReactionTs[0]>6000)recentReactionTs.shift();
      return;
    }
  }

  // Find keyword match
  var matched=null;
  for(var i=0;i<KEYWORDS.length;i++){
    if(KEYWORDS[i].words.indexOf(word)>=0){matched=KEYWORDS[i];break}
  }

  if(matched){
    var inHeavyCooldown=(now-lastHeavyReactionTs<600);
    if(matched.weight==='heavy'&&inHeavyCooldown){
      dbgLog('miss','['+src+'] "'+word+'" → '+matched.text+' BLOCKED (heavy cooldown '+(now-lastHeavyReactionTs)+'ms)');
      return;
    }
    // HIGH-HEAT SELECTIVITY: when he's locked in, the ultimate hype man
    // doesn't parrot every light hit — he saves it so the big ones land.
    if(matched.weight==='light'&&heat>70&&Math.random()<0.5){
      dbgLog('miss','['+src+'] "'+word+'" → '+matched.text+' held (locked in, heat='+Math.round(heat)+')');
      reactedWords[word]={ts:now,count:1};
      return;
    }
    // CATEGORY MEMORY: 2nd hit on the same theme escalates the visual;
    // 3rd hit in 30s goes full call-and-response — repeat the tag, heavy.
    var catCount=noteCatHit(matched.audio);
    var fireWeight=matched.weight;
    var txt=matched.text; // fallback tag — fireHype swaps in the actual voice line
    if(catCount>=3){
      txt=matched.text+' '+matched.text;
      fireWeight='heavy';
      dbgLog('fire','['+src+'] "'+word+'" → '+matched.text+' [CAT x'+catCount+' — escalating]');
    }else{
      dbgLog('fire','['+src+'] "'+word+'" → '+txt+' ['+fireWeight+'] heat='+Math.round(heat));
    }
    fireHype({text:txt,color:matched.color,fx:matched.fx,audio:matched.audio,signature:catCount>=3},fireWeight);
    flashSubWord(word);
    bumpHeat(matched.weight==='heavy'?6:4);
    reactedWords[word]={ts:now,count:1};
    lastReactionTs=now;
    if(fireWeight==='heavy'){
      lastHeavyReactionTs=now;
      // After a heavy reaction, mark for pause-respect (if rapper trails off, hit a soft note)
      pendingPauseRespect=true;
      setTimeout(function(){pendingPauseRespect=false},2500);
    }
    recentReactionTs.push(now);
    while(recentReactionTs.length&&now-recentReactionTs[0]>6000)recentReactionTs.shift();
    return;
  }

  // Echo logic — only on FINAL words, only when no keyword fired in a while,
  // and only on substantial, interesting words (no filler/grammar/stopwords).
  // Echo is meant to be a "punctuation" beat, not a constant reaction.
  // HEAT-GATED: he fills space early in the set; once you're cooking
  // (heat>60) he stops chattering and saves his voice for real moments.
  if(isFinal&&word.length>=5&&word.length<=14&&!ECHO_STOPWORDS[word]&&heat<=60){
    var echoGap=2000+heat*25; // chattier cold, quieter warm
    if(now-lastReactionTs>echoGap){
      var echoText=word.toUpperCase()+'! '+word.toUpperCase()+'!';
      dbgLog('fire','['+src+'] "'+word+'" → ECHO (heat='+Math.round(heat)+')');
      fireHype({text:echoText,fx:fxAyy,color:'#FF6B35'},'light');
      flashSubWord(word);
      bumpHeat(2);
      reactedWords[word]={ts:now,count:1};
      lastReactionTs=now;
      recentReactionTs.push(now);
      while(recentReactionTs.length&&now-recentReactionTs[0]>6000)recentReactionTs.shift();
    }else{
      dbgLog('miss','['+src+'] "'+word+'" — no kw match, echo-cooldown ('+(now-lastReactionTs)+'ms)');
    }
  }else if(!isFinal){
    dbgLog('miss','['+src+'] "'+word+'" — no kw match');
  }
}

// Common filler/grammar words that should NEVER echo — they're not punchlines
var ECHO_STOPWORDS={
  // contractions / pronouns
  "it's":1,"that's":1,"there's":1,"here's":1,"what's":1,"who's":1,"how's":1,"where's":1,
  "i'm":1,"you're":1,"we're":1,"they're":1,"i'll":1,"you'll":1,"we'll":1,"they'll":1,
  "don't":1,"can't":1,"won't":1,"didn't":1,"isn't":1,"aren't":1,"wasn't":1,"weren't":1,
  "i've":1,"you've":1,"we've":1,"they've":1,"i'd":1,"you'd":1,"we'd":1,"they'd":1,
  // common short verbs
  "was":1,"were":1,"have":1,"having":1,"been":1,"being":1,"will":1,"would":1,"could":1,
  "should":1,"might":1,"must":1,"shall":1,"does":1,"doing":1,"goes":1,"going":1,"gone":1,
  "said":1,"says":1,"saying":1,"got":1,"getting":1,"makes":1,"making":1,"took":1,"taking":1,
  "give":1,"gave":1,"giving":1,"come":1,"came":1,"coming":1,"went":1,"want":1,"wanted":1,
  // articles / determiners / prepositions / conjunctions / pronouns
  "this":1,"that":1,"these":1,"those":1,"with":1,"without":1,"about":1,"above":1,"after":1,
  "before":1,"between":1,"during":1,"into":1,"onto":1,"upon":1,"under":1,"over":1,"through":1,
  "from":1,"some":1,"only":1,"even":1,"also":1,"than":1,"then":1,"when":1,"where":1,"while":1,
  "what":1,"which":1,"whose":1,"because":1,"since":1,"until":1,"unless":1,
  "your":1,"yours":1,"their":1,"theirs":1,"ours":1,"hers":1,"mine":1,
  "them":1,"they":1,"there":1,"here":1,
  // common filler
  "very":1,"much":1,"more":1,"most":1,"many":1,"like":1,"just":1,"well":1,"such":1,
  "really":1,"actually":1,"basically":1,"literally":1,"probably":1,"maybe":1,"kinda":1,
  "gonna":1,"wanna":1,"gotta":1,"lemme":1,"tryna":1,
  // numbers / time fillers
  "one":1,"two":1,"three":1,"four":1,"five":1,"six":1,"seven":1,"eight":1,"nine":1,"ten":1,
  "first":1,"second":1,"third":1,"last":1,"next":1,"another":1,
  // greetings / fillers spoken aloud
  "hello":1,"hey":1,"okay":1,"alright":1,"thanks":1,"please":1,"sorry":1,"excuse":1
};

// Rough syllable counter — heuristic, good enough for streak detection
function countSyllables(word){
  if(!word)return 0;
  word=word.toLowerCase().replace(/[^a-z]/g,'');
  if(word.length<=2)return 1;
  // Strip silent e
  word=word.replace(/e$/,'');
  // Count vowel groups
  var matches=word.match(/[aeiouy]+/g);
  return matches?Math.max(1,matches.length):1;
}

// Periodically sweep stale entries from reactedWords map
setInterval(function(){
  var now=Date.now();
  for(var k in reactedWords){if(now-reactedWords[k].ts>4000)delete reactedWords[k]}
  for(var k in interimSeen){if(now-interimSeen[k]>10000)delete interimSeen[k]}
  for(var k in catHits){if(now-catHits[k].ts>30000)delete catHits[k]}
},2000);

// RMS monitoring — silence-based generic fallback (only when really quiet)
var lastFallbackTs=0;
var lastRmsLogTs=0;
function monitorRMS(){
  if(!micOn||!micAn)return;
  setTimeout(monitorRMS,150);
  var bufLen=micAn.fftSize,td=new Uint8Array(bufLen);
  micAn.getByteTimeDomainData(td);
  var sum=0;for(var i=0;i<bufLen;i++){var v=(td[i]-128)/128;sum+=v*v}
  var rms=Math.sqrt(sum/bufLen);
  rmsHistory.push({rms:rms,ts:Date.now()});
  if(rmsHistory.length>40)rmsHistory.shift();

  var now=Date.now();
  // Log RMS every 1s while debug is open and dbg sees activity
  if(now-lastRmsLogTs>1000){
    lastRmsLogTs=now;
    if(rms>0.05||(rms<0.04&&rmsHistory.length>10&&rmsHistory[rmsHistory.length-3].rms>0.05)){
      // Only log RMS during interesting moments (talking or just stopped)
      dbgLog('silent','RMS='+rms.toFixed(3)+(rms>0.06?' (loud)':rms>0.04?' (quiet)':' (silent)'));
    }
  }
  if(rms<0.035){
    var silentDur=0;
    for(var i=rmsHistory.length-1;i>=0;i--){
      if(rmsHistory[i].rms<0.035)silentDur=now-rmsHistory[i].ts;else break;
    }
    // PAUSE RESPECT: rapper just landed a heater and trailed off.
    // 800-1500ms silent window: drop a single soft reverb hit. Don't stomp.
    if(pendingPauseRespect&&silentDur>800&&silentDur<1500&&now-lastReactionTs>700){
      pendingPauseRespect=false;
      dbgLog('fire','PAUSE RESPECT [trailed off after heater]');
      fireHype({text:'damn.',fx:fxBell,color:'#AF52DE'},'light');
      lastReactionTs=now;
    }
    // 2-4s silent window: throw a generic hype to keep energy. After 4s, chill out.
    if(silentDur>2000&&silentDur<4000&&now-lastReactionTs>2200&&now-lastFallbackTs>3500){
      var g=GENERIC_HYPE[Math.floor(Math.random()*GENERIC_HYPE.length)];
      dbgLog('fire','GENERIC FALLBACK ['+silentDur+'ms silent]: '+g.text);
      fireHype(g,'medium');
      lastReactionTs=now;
      lastFallbackTs=now;
    }
  }
}

// ============================================================
// VOICE AUDIO LAYER (ElevenLabs / pre-generated MP3s)
// ============================================================
// Audio files live at: /audio/{mode}/{slug}_{variant}.mp3
// e.g. /audio/hype/fire_1.mp3, /audio/hype/fire_2.mp3, /audio/hype/fire_3.mp3
// We probe for variants 1-3 lazily per slug, cache results, fall back to none if missing.
var VARIANTS_PER_SLUG=3;
var audioCache={};         // "mode/slug" -> array of HTMLAudioElement (loaded variants only)
var audioProbed={};        // "mode/slug" -> true once we've tried to load
var voiceEnabled=true;     // master toggle (could expose later)
var voiceBaseVol=0.85;     // base voice mix level on top of synth FX

function audioPath(mode,slug,variant){
  return 'audio/'+mode+'/'+slug+'_'+variant+'.mp3';
}

// Probe for available variants the first time a slug is requested
function loadVariantsForSlug(mode,slug){
  var key=mode+'/'+slug;
  if(audioProbed[key])return audioCache[key]||[];
  audioProbed[key]=true;
  audioCache[key]=[];
  for(var v=1;v<=VARIANTS_PER_SLUG;v++){
    (function(variant){
      var a=new Audio(audioPath(mode,slug,variant));
      a.preload='auto';
      a.volume=voiceBaseVol;
      a._v=variant; // remember which variant this is — voice-led visuals need it
      a.addEventListener('canplaythrough',function(){
        // Only add to the cache once it's actually playable
        if(audioCache[key].indexOf(a)<0)audioCache[key].push(a);
      });
      a.addEventListener('error',function(){
        // 404 or decode failure — silently skip
      });
      // Trigger load
      try{a.load()}catch(e){}
    })(v);
  }
  return audioCache[key];
}

// Pick a loaded variant number for a slug WITHOUT playing it — lets fireHype
// choose the line first so the burst text matches the voice exactly.
// Returns variant number (1-3) or 0 if nothing loaded yet.
function pickLoadedVariant(slug){
  var mode=hypeMode;
  var variants=loadVariantsForSlug(mode,slug);
  if(variants.length===0&&mode!=='hype')variants=loadVariantsForSlug('hype',slug);
  if(variants.length===0)return 0;
  var pick=variants[Math.floor(Math.random()*variants.length)];
  if(variants.length>1&&pick._v===pickLoadedVariant._last){
    pick=variants[(variants.indexOf(pick)+1)%variants.length];
  }
  pickLoadedVariant._last=pick._v;
  return pick._v;
}

// Play voice for a reaction. Picks a random loaded variant — or the exact
// variant requested (so the visual and the voice say the same line).
function playVoice(slug,preferV){
  if(!voiceEnabled||!slug)return false;
  var mode=hypeMode; // 'hype' or 'boom'
  var variants=loadVariantsForSlug(mode,slug);
  // Try this mode first; if it has nothing, fall back to 'hype' as default
  if(variants.length===0&&mode!=='hype'){
    variants=loadVariantsForSlug('hype',slug);
  }
  if(variants.length===0){
    dbgLog('system','voice MISS: '+mode+'/'+slug+' (no variants loaded yet)');
    return false;
  }
  var pick=null;
  if(preferV){
    for(var i=0;i<variants.length;i++){if(variants[i]._v===preferV){pick=variants[i];break}}
  }
  if(!pick){
    // Pick a random variant, but try not to repeat the immediately-prior one
    pick=variants[Math.floor(Math.random()*variants.length)];
    if(variants.length>1&&pick===playVoice._lastPick){
      pick=variants[(variants.indexOf(pick)+1)%variants.length];
    }
  }
  playVoice._lastPick=pick;
  // Play the primed audio element directly (no clone — iOS Safari blocks cloned audio).
  // If the same variant fires twice quickly, the second call resets currentTime and replays.
  try{
    pick.volume=voiceBaseVol*getHypeVolumeScale();
    pick.currentTime=0;
    var p=pick.play();
    if(p&&p.then){
      p.catch(function(err){dbgLog('miss','voice play rejected: '+err.name+' — '+err.message)});
    }
    dbgLog('fire','voice: '+mode+'/'+slug);
    return true;
  }catch(e){
    dbgLog('miss','voice play failed: '+e);
    return false;
  }
}

// ============================================================
// FIRE HYPE — visual + voice + sound + dim subtitles briefly
// ============================================================
// THE POCKET — a real hype man lands ON the beat, not on the word.
// If the beat is playing and the next 8th-note grid point is close,
// hold the AUDIO until that grid point (visual still fires instantly —
// eyes want immediacy, ears want rhythm). If the pocket is too far
// away (>180ms), fire now; a late reaction is worse than an off-grid one.
function pocketDelayMs(){
  if(!playing||!ac||!audioUnlocked)return 0;
  var stepDur=60/tempo/4,grid=stepDur*2; // 8th notes
  var loopDur=16*stepDur;
  var pos=((ac.currentTime-loopSt)%loopDur+loopDur)%loopDur;
  var wait=grid-(pos%grid);
  if(wait<0.02)wait+=grid; // grid point basically now — take the next one clean
  return wait<=0.18?Math.round(wait*1000):0;
}
function fireHype(item,weight){
  // Volume matching: scale hype output relative to recent RMS energy
  // Quiet rap → quieter hype. Loud rap → louder hype.
  var hypeVol=getHypeVolumeScale();
  if(hypeBus)hypeBus.gain.setTargetAtTime(hypeVol,getAC().currentTime,0.05);

  // VOICE-LED VISUALS: if this reaction has a voice, pick the exact variant
  // NOW and paint the line he's about to say. HYPE mode shouts in caps;
  // BOOM mode keeps the lowercase deadpan — the visual carries the character.
  // Signatures and custom-text moments (throwback) keep their own text.
  var burstText=item.text,chosenV=0;
  if(item.audio&&!item.signature&&!item.keepText&&typeof PHRASES!=='undefined'&&PHRASES[item.audio]){
    chosenV=pickLoadedVariant(item.audio);
    if(chosenV){
      var lines=PHRASES[item.audio][hypeMode==='boom'?'boom':'hype'];
      if(lines&&lines[chosenV-1]){
        burstText=hypeMode==='boom'?lines[chosenV-1]:lines[chosenV-1].toUpperCase();
      }
    }
  }

  showGraffitiBurst(burstText,item.color,!!item.signature);
  // Dim the subtitle stripe so the burst dominates
  var subs=document.getElementById('subs');
  if(subsVisible){
    subs.classList.add('dim');
    clearTimeout(fireHype._dimT);
    var dimDur=item.signature?900:(weight==='heavy'?500:350);
    fireHype._dimT=setTimeout(function(){subs.classList.remove('dim')},dimDur);
  }
  // Voice + synth fx layered together — snapped to the beat pocket when one is near.
  // The voice plays the SAME variant the burst is showing.
  var pd=pocketDelayMs();
  var playAudio=function(){
    if(item.audio)playVoice(item.audio,chosenV);
    if(item.fx)try{item.fx()}catch(e){}
  };
  if(pd>0){dbgLog('system','pocket: holding audio '+pd+'ms for the grid');setTimeout(playAudio,pd)}
  else playAudio();
}

// Compute hype volume scale based on recent RMS — quieter when rapper is quiet
function getHypeVolumeScale(){
  if(!rmsHistory.length)return 1.0;
  // Take peak of last ~1.5s
  var peak=0,now=Date.now();
  for(var i=rmsHistory.length-1;i>=0;i--){
    if(now-rmsHistory[i].ts>1500)break;
    if(rmsHistory[i].rms>peak)peak=rmsHistory[i].rms;
  }
  // Map RMS 0.03-0.25 → scale 0.55-1.15
  if(peak<0.03)return 0.65;
  if(peak>0.25)return 1.15;
  return 0.65+(peak-0.03)*((1.15-0.65)/(0.25-0.03));
}

function showGraffitiBurst(text,color,isSignature){
  var stage=document.getElementById('hypeStage');
  var el=document.createElement('div');
  el.className='hype-burst'+(isSignature?' signature':'');
  el.textContent=text;
  var cx,cy;
  if(isSignature){
    // Center it, big — this is a brand moment
    cx=W*0.5+(Math.random()-0.5)*W*0.1;
    cy=H*0.4+(Math.random()-0.5)*H*0.08;
  }else{
    cx=W*0.5+(Math.random()-0.5)*W*0.35;
    cy=H*0.4+(Math.random()-0.5)*H*0.22;
  }
  el.style.left=cx+'px';
  el.style.top=cy+'px';
  if(!isSignature){
    // Heat scales the burst — cold open is modest, peak set is WALL-SIZED
    var heatScale=1+heat/200; // 1.0 cold → 1.5 peaked
    var size=Math.max(54,Math.min(170,(W*0.2-text.length*2)*heatScale));
    el.style.fontSize=size+'px';
    el.style.color=color;
    el.style.webkitTextStroke='3px #1A1A1A';
  }
  el.style.setProperty('--rot',((Math.random()-0.5)*(isSignature?10:14))+'deg');
  stage.appendChild(el);
  // Splatter dots — more for signature, more when heat is up
  var n=(isSignature?14:6)+Math.floor(heat/25);
  for(var i=0;i<n;i++){
    var sp=document.createElement('div');sp.className='hype-splatter';
    sp.style.left=cx+'px';sp.style.top=cy+'px';
    sp.style.background=isSignature?(['#FF3B30','#FF9500','#FFCC00'][i%3]):color;
    var ang=Math.random()*Math.PI*2,d=(isSignature?80:40)+Math.random()*(isSignature?180:120);
    sp.style.setProperty('--dx',Math.cos(ang)*d+'px');
    sp.style.setProperty('--dy',Math.sin(ang)*d+'px');
    stage.appendChild(sp);
    setTimeout(function(s){return function(){s.remove()}}(sp),isSignature?1800:1300);
  }
  setTimeout(function(){el.remove()},isSignature?2000:1500);
}

// CONTROLS
// ============================================================
function resetUserHits(){
  userHits=initPat();
  loadGenre();
  if(melActive)genMel();
  // Clear all markers
  for(var i=0;i<userHitMarkers.length;i++){try{userHitMarkers[i].el.remove()}catch(e){}}
  userHitMarkers=[];
  document.getElementById('resetBtn').style.display='none';
  lastUndoableRemoval=null;
}

init();
</script>
